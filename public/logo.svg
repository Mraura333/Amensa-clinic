    font-weight="bold"
    fill="#0062AF"
    text-anchor="middle"
    letter-spacing="-0.5"
  >amensa<tspan font-size="12" dy="-14">®</tspan></text>
  
  <!-- Centered sub-brand "DIAGNOSTICS" in clean, letter-spaced uppercase sans-serif -->
