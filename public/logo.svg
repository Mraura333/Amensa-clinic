<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="100%" height="100%">
  <!-- Beautiful, high-fidelity official logo curves -->
  <g transform="translate(40, 15)">
    <path d="M 34 34 C 48 24, 68 12, 94 12 C 82 22, 60 30, 34 34 Z" fill="#0062AF" />
    <path d="M 26 40 C 42 30, 66 21, 98 21 C 84 29, 56 36, 26 40 Z" fill="#76C139" />
    <path d="M 18 46 C 36 36, 64 30, 101 30 C 84 38, 52 42, 18 46 Z" fill="#FBC02D" />
    <path d="M 10 52 C 30 43, 60 39, 94 42 C 76 47, 44 49, 10 52 Z" fill="#DE3232" />
  </g>
  
  <!-- Centered brand text "amensa" in bold serif -->
  <text
    x="100"
    y="114"
    font-family="'Lora', 'Georgia', 'Times New Roman', serif"
